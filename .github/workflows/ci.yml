name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v2.11.3

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        run: just test
      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: just ci-smoke

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      - name: Run tests with coverage
        run: just test-coverage
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.txt
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      - name: Build release binary
        run: just build-release
      - name: Verify binary
        run: ./opnconfiggenerator --version || ./opnconfiggenerator --help
      - name: Cross-compile check
        run: |
          GOOS=linux GOARCH=amd64 go build -o /dev/null main.go
          GOOS=darwin GOARCH=arm64 go build -o /dev/null main.go
          GOOS=windows GOARCH=amd64 go build -o /dev/null main.go